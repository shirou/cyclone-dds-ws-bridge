services:
  # Phase 6-1: CDR interop tests (no bridge required)
  #
  # Each service generates its own fixtures, waits for the other's fixtures
  # to appear on the shared volume, then runs cross-language verification.
  #
  # Run: docker compose -f docker-compose.test.yml --profile interop up --abort-on-container-exit --exit-code-from go-verify

  go-verify:
    profiles: ["interop"]
    build:
      context: .
      dockerfile: tests/interop/go/Dockerfile
    command:
      - sh
      - -c
      - |
        go test -v -run TestGenerateGoFixtures ./...
        echo "Waiting for Python fixtures..."
        while [ ! -f ../fixtures/py_sensor_data.bin ]; do sleep 0.2; done
        go test -v -run "TestDecodePythonFixtures|TestByteExactComparison" ./...
    volumes:
      - interop-fixtures:/app/tests/interop/fixtures

  py-verify:
    profiles: ["interop"]
    build:
      context: .
      dockerfile: tests/interop/python/Dockerfile
    command:
      - sh
      - -c
      - |
        python3 /app/scripts/generate_fixtures.py
        echo "Waiting for Go fixtures..."
        while [ ! -f /app/fixtures/go_sensor_data.bin ]; do sleep 0.2; done
        python3 /app/scripts/verify_go_fixtures.py
    volumes:
      - interop-fixtures:/app/fixtures

  # Phase 6-2: Bridge E2E tests
  #
  # Run: docker compose -f docker-compose.test.yml --profile e2e up --abort-on-container-exit

  bridge:
    profiles: ["e2e"]
    build:
      context: .
      target: runtime
    environment:
      - CYCLONEDDS_URI=<CycloneDDS><Domain><General><Interfaces><NetworkInterface name="lo"/></Interfaces><AllowMulticast>false</AllowMulticast></General></Domain></CycloneDDS>
      - DDS_BRIDGE_WS_ADDR=0.0.0.0
      - DDS_BRIDGE_WS_PORT=9876
      - RUST_LOG=debug
    healthcheck:
      test: ["CMD", "cyclone-dds-ws-bridge", "healthcheck"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  go-e2e:
    profiles: ["e2e"]
    build:
      context: .
      dockerfile: tests/e2e/go/Dockerfile
    environment:
      - BRIDGE_ADDR=ws://bridge:9876
    depends_on:
      bridge:
        condition: service_healthy

  py-e2e:
    profiles: ["e2e"]
    build:
      context: .
      dockerfile: tests/e2e/python/Dockerfile
    environment:
      - BRIDGE_ADDR=ws://bridge:9876
    depends_on:
      bridge:
        condition: service_healthy

  # Phase 7: Python client tests (pytest-based, against running bridge)
  #
  # Run: docker compose -f docker-compose.test.yml --profile client up --abort-on-container-exit

  bridge-for-client:
    profiles: ["client"]
    build:
      context: .
      target: runtime
    environment:
      - CYCLONEDDS_URI=<CycloneDDS><Domain><General><Interfaces><NetworkInterface name="lo"/></Interfaces><AllowMulticast>false</AllowMulticast></General></Domain></CycloneDDS>
      - DDS_BRIDGE_WS_ADDR=0.0.0.0
      - DDS_BRIDGE_WS_PORT=9876
      - RUST_LOG=debug
    healthcheck:
      test: ["CMD", "cyclone-dds-ws-bridge", "healthcheck"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  py-client:
    profiles: ["client"]
    build:
      context: .
      dockerfile: tests/client/Dockerfile
    environment:
      - BRIDGE_ADDR=ws://bridge-for-client:9876
    depends_on:
      bridge-for-client:
        condition: service_healthy

volumes:
  interop-fixtures:
