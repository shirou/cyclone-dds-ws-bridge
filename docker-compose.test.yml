services:
  # Phase 6-1: CDR interop tests (no bridge required)
  #
  # Pipeline:
  #   1. go-generate-fixtures: Go marshals test data -> go_*.bin
  #   2. py-generate-fixtures: Python marshals test data -> py_*.bin
  #   3. go-verify: Go decodes py_*.bin + byte-exact comparison
  #   4. py-verify: Python decodes go_*.bin + value comparison
  #
  # Run: docker compose -f docker-compose.test.yml --profile interop up --abort-on-container-exit

  go-generate-fixtures:
    profiles: ["interop"]
    build:
      context: .
      dockerfile: tests/interop/go/Dockerfile
    command: ["go", "test", "-v", "-run", "TestGenerateGoFixtures", "./..."]
    volumes:
      - interop-fixtures:/app/tests/interop/fixtures

  py-generate-fixtures:
    profiles: ["interop"]
    build:
      context: .
      dockerfile: tests/interop/python/Dockerfile
    command: ["python3", "/app/scripts/generate_fixtures.py"]
    volumes:
      - interop-fixtures:/app/fixtures

  go-verify:
    profiles: ["interop"]
    build:
      context: .
      dockerfile: tests/interop/go/Dockerfile
    command: ["go", "test", "-v", "-run", "TestDecodePythonFixtures|TestByteExactComparison", "./..."]
    depends_on:
      py-generate-fixtures:
        condition: service_completed_successfully
    volumes:
      - interop-fixtures:/app/tests/interop/fixtures

  py-verify:
    profiles: ["interop"]
    build:
      context: .
      dockerfile: tests/interop/python/Dockerfile
    command: ["python3", "/app/scripts/verify_go_fixtures.py"]
    depends_on:
      go-generate-fixtures:
        condition: service_completed_successfully
    volumes:
      - interop-fixtures:/app/fixtures

  # Phase 6-2: Bridge E2E tests
  #
  # Run: docker compose -f docker-compose.test.yml --profile e2e up --abort-on-container-exit

  bridge:
    profiles: ["e2e"]
    build:
      context: .
      target: runtime
    environment:
      - CYCLONEDDS_URI=<CycloneDDS><Domain><General><Interfaces><NetworkInterface name="lo"/></Interfaces><AllowMulticast>false</AllowMulticast></General></Domain></CycloneDDS>
      - DDS_BRIDGE_WS_ADDR=0.0.0.0
      - DDS_BRIDGE_WS_PORT=9876
      - RUST_LOG=debug
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9876' 2>/dev/null"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  go-e2e:
    profiles: ["e2e"]
    build:
      context: .
      dockerfile: tests/e2e/go/Dockerfile
    environment:
      - BRIDGE_ADDR=ws://bridge:9876
    depends_on:
      bridge:
        condition: service_healthy

  py-e2e:
    profiles: ["e2e"]
    build:
      context: .
      dockerfile: tests/e2e/python/Dockerfile
    environment:
      - BRIDGE_ADDR=ws://bridge:9876
    depends_on:
      bridge:
        condition: service_healthy

volumes:
  interop-fixtures:
